deptrac:
  paths:
    - ./app/Domains
  exclude_files:
    - 'vendor/.*'

  layers:
    # Shared contracts and DTOs - accessible by all domains
    - name: Shared
      collectors:
        - type: directory
          value: 'app/Domains/Shared/'

    # Test helpers - can be shared between domain tests
    - name: TestHelpers
      collectors:
        - type: directory
          value: 'app/Domains/Shared/Testing/'

    # Admin Domain
    - name: AdminPrivate
      collectors:
        - type: bool
          must_not:
            - type: directory
              value: app/Domains/Admin/Tests/
          must:
            - type: directory
              value: app/Domains/Admin/

    - name: AdminTests
      collectors:
        - type: directory
          value: 'app/Domains/Admin/Tests/'

    # Administration Domain
    # This is the domain that will replace admin (Filament) on the long run
    - name: AdministrationPublic
      collectors:
        - type: directory
          value: 'app/Domains/Administration/Public/'

    - name: AdministrationPrivate
      collectors:
        - type: directory
          value: 'app/Domains/Administration/Private/'

    - name: AdministrationTests
      collectors:
        - type: directory
          value: 'app/Domains/Administration/Tests/'

    # Auth Domain
    - name: AuthPublic
      collectors:
        - type: directory
          value: 'app/Domains/Auth/Public/Api/'
        - type: directory
          value: 'app/Domains/Auth/Public/Events/'

    - name: AuthPrivate
      collectors:
        - type: bool
          must_not:
            - type: directory
              value: app/Domains/Auth/Public/
            - type: directory
              value: app/Domains/Auth/Tests/
          must:
            - type: directory
              value: app/Domains/Auth/

    - name: AuthTests
      collectors:
        - type: directory
          value: 'app/Domains/Auth/Tests/'

    # Comment Domain
    - name: CommentPublic
      collectors:
        - type: directory
          value: 'app/Domains/Comment/Public/'

    - name: CommentPrivate
      collectors:
        - type: directory
          value: app/Domains/Comment/Private/

    - name: CommentTests
      collectors:
        - type: directory
          value: 'app/Domains/Comment/Tests/'

    # Calendar domain
    - name: CalendarPublic
      collectors:
        - type: directory
          value: 'app/Domains/Calendar/Public/'

    - name: CalendarPrivate
      collectors:
        - type: directory
          value: app/Domains/Calendar/Private/

    - name: CalendarTests
      collectors:
        - type: directory
          value: app/Domains/Calendar/Tests/

    # Config Domain
    - name: ConfigPublic
      collectors:
        - type: directory
          value: 'app/Domains/Config/Public/'

    - name: ConfigPrivate
      collectors:
        - type: directory
          value: app/Domains/Config/Private/

    - name: ConfigTests
      collectors:
        - type: directory
          value: app/Domains/Config/Tests/

    # Dashboard Domain
    - name: DashboardPublic
      collectors:
        - type: directory
          value: 'app/Domains/Dashboard/Public/'

    - name: DashboardPrivate
      collectors:
        - type: directory
          value: app/Domains/Dashboard/Private/

    # Events domains
    - name: EventsPublic
      collectors:
        - type: directory
          value: app/Domains/Events/Public/
        
    - name: EventsPrivate
      collectors:
        - type: directory
          value: app/Domains/Events/Private/

    - name: EventsTests
      collectors:
        - type: directory
          value: app/Domains/Events/Tests/

    # Discord Domain
    - name: DiscordPublic
      collectors:
        - type: directory
          value: 'app/Domains/Discord/Public/'

    - name: DiscordPrivate
      collectors:
        - type: directory
          value: app/Domains/Discord/Private/

    - name: DiscordTests
      collectors:
        - type: directory
          value: 'app/Domains/Discord/Tests/'

    # FAQ Domain
    - name: FAQPublic
      collectors:
        - type: directory
          value: app/Domains/FAQ/Public/

    - name: FAQPrivate
      collectors:
        - type: directory
          value: app/Domains/FAQ/Private/

    - name: FAQTests
      collectors:
        - type: directory
          value: app/Domains/FAQ/Tests/

    # Search Domain
    - name: SearchPublic
      collectors:
        - type: directory
          value: 'app/Domains/Search/Public/'

    - name: SearchPrivate
      collectors:
        - type: directory
          value: app/Domains/Search/Private/

    - name: SearchTests
      collectors:
        - type: directory
          value: 'app/Domains/Search/Tests/'

    # Settings Domain
    - name: SettingsPublic
      collectors:
        - type: directory
          value: 'app/Domains/Settings/Public/'

    - name: SettingsPrivate
      collectors:
        - type: directory
          value: app/Domains/Settings/Private/

    - name: SettingsTests
      collectors:
        - type: directory
          value: 'app/Domains/Settings/Tests/'

    # Home Domain
    - name: HomePublic
      collectors:
        - type: directory
          value: 'app/Domains/Home/Public/'

    - name: HomePrivate
      collectors:
        - type: directory
          value: app/Domains/Home/Private/

    # Message Domain
    - name: MessagePublic
      collectors:
        - type: directory
          value: app/Domains/Message/Public/

    - name: MessagePrivate
      collectors:
        - type: directory
          value: app/Domains/Message/Private/

    - name: MessageTests
      collectors:
        - type: directory
          value: app/Domains/Message/Tests/

    #Moderation Domain
    - name: ModerationPublic
      collectors:
        - type: directory
          value: 'app/Domains/Moderation/Public/'

    - name: ModerationPrivate
      collectors:
        - type: directory
          value: app/Domains/Moderation/Private/

    - name: ModerationTests
      collectors:
        - type: directory
          value: app/Domains/Moderation/Tests/

    # News Domain
    - name: NewsPublic
      collectors:
        - type: directory
          value: 'app/Domains/News/Public/'

    - name: NewsPrivate
      collectors:
        - type: directory
          value: app/Domains/News/Private/

    - name: NewsTests
      collectors:
        - type: directory
          value: 'app/Domains/News/Tests/'

    # Notification Domain
    - name: NotificationPublic
      collectors:
        - type: directory
          value: 'app/Domains/Notification/Public/'

    - name: NotificationPrivate
      collectors:
        - type: directory
          value: app/Domains/Notification/Private/

    - name: NotificationTests
      collectors:
        - type: directory
          value: app/Domains/Notification/Tests/

    # Profile Domain
    - name: ProfilePublic
      collectors:
        - type: directory
          value: 'app/Domains/Profile/Public/'

    - name: ProfilePrivate
      collectors:
        - type: directory
          value: 'app/Domains/Profile/Private/'

    - name: ProfileTests
      collectors:
        - type: directory
          value: 'app/Domains/Profile/Tests/'

    # ReadList Domain
    - name: ReadListPublic
      collectors:
        - type: directory
          value: 'app/Domains/ReadList/Public/'

    - name: ReadListPrivate
      collectors:
        - type: directory
          value: 'app/Domains/ReadList/Private/'

    - name: ReadListTests
      collectors:
        - type: directory
          value: 'app/Domains/ReadList/Tests/'

    # StaticPage Domain
    - name: StaticPagePublic
      collectors:
        - type: directory
          value: 'app/Domains/StaticPage/Public/'

    - name: StaticPagePrivate
      collectors:
        - type: directory
          value: app/Domains/StaticPage/Private/

    - name: StaticPageTests
      collectors:
        - type: directory
          value: 'app/Domains/StaticPage/Tests/'

    # Story Domain
    - name: StoryPublic
      collectors:
        - type: directory
          value: 'app/Domains/Story/Public/'

    - name: StoryPrivate
      collectors:
        - type: directory
          value: 'app/Domains/Story/Private/'

    - name: StoryTests
      collectors:
        - type: directory
          value: 'app/Domains/Story/Tests/'

    - name: StoryRefPublic
      collectors:
        - type: directory
          value: app/Domains/StoryRef/Public/

    - name: StoryRefPrivate
      collectors:
        - type: directory
          value: app/Domains/StoryRef/Private/

    - name: StoryRefTests
      collectors:
        - type: directory
          value: app/Domains/StoryRef/Tests/

  ruleset:
    # Shared contracts and DTOs - accessible by all domains
    Shared:
      - SettingsPublic

    # Test helpers - accessible by all domain tests
    TestHelpers: [ ]

    # ###################################################
    # Public APIs - can only depend on Shared and their own domain
    # ###################################################
    AdministrationPublic:
      - Shared
      - AdministrationPrivate
      - AuthPublic

    AuthPublic:
      - Shared
      - AuthPrivate
      - EventsPublic

    CalendarPublic:
      - Shared
      - CalendarPrivate
      - AuthPublic

    CommentPublic: 
      - Shared
      - AuthPublic
      - CommentPrivate
      - EventsPublic
      - ModerationPublic

    ConfigPublic:
      - Shared
      - ConfigPrivate
      - EventsPublic
      - AuthPublic
      - AdministrationPublic

    DashboardPublic:
      - Shared
      - DashboardPrivate

    EventsPublic:
      - Shared
      - EventsPrivate

    DiscordPublic:
      - AuthPublic
      - Shared
      - DiscordPrivate
      - EventsPublic

    FAQPublic:
      - Shared
      - FAQPrivate
      - AuthPublic

    HomePublic:
      - Shared
      - HomePrivate

    MessagePublic:
      - Shared
      - MessagePrivate
      - EventsPublic

    ModerationPublic:
      - Shared
      - ModerationPrivate
      - EventsPublic
      - AuthPublic
      - AdministrationPublic

    NewsPublic:
      - AuthPublic
      - Shared
      - NewsPrivate
      - EventsPublic
      - AdministrationPublic
      - NotificationPublic

    NotificationPublic:
      - Shared
      - NotificationPrivate
      - AuthPublic
      - EventsPublic
      - SettingsPublic

    ProfilePublic:
      - Shared
      - ProfilePrivate
      - AuthPublic
      - EventsPublic
      - ModerationPublic
      - SettingsPublic

    ReadListPublic:
      - Shared
      - ReadListPrivate
      - AuthPublic
      - EventsPublic
      - NotificationPublic
      - SettingsPublic
      - StoryPublic

    SearchPublic:
      - Shared
      - SearchPrivate

    SettingsPublic:
      - Shared
      - SettingsPrivate

    StaticPagePublic:
      - AuthPublic
      - Shared
      - StaticPagePrivate
      - EventsPublic
      - AdministrationPublic

    StoryPublic:
      - CommentPublic
      - Shared
      - StoryPrivate
      - StoryRefPublic
      - EventsPublic
      - AuthPublic
      - ModerationPublic
      - NotificationPublic
      - ConfigPublic
      - AdministrationPublic

    StoryRefPublic:
      - Shared
      - EventsPublic
      - AuthPublic
      - StoryRefPrivate
      - AdministrationPublic

    # ###################################################
    # Private domains - can access Shared + other domain Public APIs + events
    # ###################################################

    # [Exception] Admin can use both Public and Private parts
    # This is because the Admin dashboards are centered in this module
    # But they actually could be spread in their own modules
    AdminPrivate:
      - Shared
      - AuthPublic
      - AuthPrivate
      - NewsPublic
      - NewsPrivate
      - ProfilePublic
      - ProfilePrivate
      - StaticPagePublic
      - StaticPagePrivate
      - StoryPublic
      - StoryPrivate
      - StoryRefPublic
      - StoryRefPrivate
      - HomePrivate
      - EventsPublic
      - EventsPrivate
      - ConfigPublic
      - ConfigPrivate
      - ModerationPublic
      - ModerationPrivate
      - FAQPublic
      - FAQPrivate
      - CalendarPublic
      - CalendarPrivate

    AdministrationPrivate:
      - Shared
      - AdministrationPublic

    AuthPrivate:
      - Shared
      - AuthPublic
      - EventsPublic
      - AdministrationPublic
      - ConfigPublic        # This dependency is necessary, but should always be lazy-loaded
      - NotificationPublic

    CalendarPrivate:
      - Shared
      - CalendarPublic
      - AuthPublic
      - StoryPublic
      - EventsPublic
 
    CommentPrivate:
      - Shared
      - AuthPublic
      - CommentPublic
      - EventsPublic
      - ModerationPublic

    ConfigPrivate:
      - Shared
      - ConfigPublic

    DashboardPrivate:
      - Shared
      - AuthPublic
      - NewsPublic
      - ProfilePublic
      - StoryPublic
      - CommentPublic
      - ConfigPublic

    EventsPrivate:
      - Shared
      - EventsPublic

    DiscordPrivate:
      - Shared
      - DiscordPublic
      - AuthPublic
      - EventsPublic

    FAQPrivate:
      - Shared
      - FAQPublic

    HomePrivate:
      - Shared
      - AuthPublic
      - NewsPublic

    MessagePrivate:
      - Shared
      - AuthPublic
      - MessagePublic
      - EventsPublic
      - ConfigPublic

    ModerationPrivate:
      - Shared
      - ModerationPublic
      - AuthPublic
      - EventsPublic

    NewsPrivate:
      - Shared
      - AuthPublic
      - EventsPublic
      - NewsPublic
      - NotificationPublic

    NotificationPrivate:
      - Shared
      - NotificationPublic
      - EventsPublic
      - AuthPublic

    ProfilePrivate:
      - Shared
      - AuthPublic
      - EventsPublic
      - ModerationPublic
      - ProfilePublic
      - SettingsPublic

    SearchPrivate:
      - Shared
      - SearchPublic
      - StoryPublic

    SettingsPrivate:
      - Shared
      - AuthPublic
      - SettingsPublic

    ReadListPrivate:
      - Shared
      - ReadListPublic
      - AuthPublic
      - EventsPublic
      - SettingsPublic
      - StoryPublic
      - NotificationPublic
      - StoryRefPublic

    StaticPagePrivate:
      - Shared
      - AuthPublic
      - EventsPublic
      - StaticPagePublic

    StoryPrivate:
      - Shared
      - AuthPublic
      - CommentPublic
      - ModerationPublic
      - ProfilePublic
      - EventsPublic
      - StoryPublic
      - StoryRefPublic
      - NotificationPublic
      - ConfigPublic

    StoryRefPrivate:
      - Shared
      - EventsPublic
      - StoryRefPublic
      - AdministrationPublic

    # ###################################################
    # Domain tests - can access their own domain + Public APIs + ALL test modules for data creation
    # ###################################################
    AdministrationTests:
      - Shared
      - TestHelpers
      - AdministrationPrivate
      - AdministrationPublic

    AuthTests:
      - Shared
      - TestHelpers
      - AuthPrivate
      - AuthPublic

    CalendarTests:
      - TestHelpers
      - CalendarPrivate
      - CalendarPublic
      - AuthPublic
      - StoryPublic
      - ProfilePublic
      - Shared

    CommentTests:
      - TestHelpers
      - CommentPrivate
      - CommentPublic

    ConfigTests:
      - TestHelpers
      - ConfigPrivate
      - ConfigPublic

    EventsTests:
      - TestHelpers
      - EventsPrivate
      - EventsPublic

    DiscordTests:
      - Shared
      - TestHelpers
      - DiscordPrivate
      - DiscordPublic
      - AuthPublic

    FAQTests:
      - TestHelpers
      - FAQPrivate
      - FAQPublic

    SearchTests:
      - Shared
      - TestHelpers
      - SearchPrivate
      - SearchPublic

    SettingsTests:
      - Shared
      - TestHelpers
      - SettingsPrivate
      - SettingsPublic

    MessageTests:
      - TestHelpers
      - MessagePrivate
      - MessagePublic

    ModerationTests:
      - TestHelpers
      - ModerationPrivate
      - ModerationPublic

    NewsTests:
      - Shared
      - TestHelpers
      - NewsPrivate
      - NewsPublic
      - AuthPublic

    NotificationTests:
      - TestHelpers
      - NotificationPrivate
      - NotificationPublic

    ProfileTests:
      - Shared
      - TestHelpers
      - ProfilePrivate
      - ProfilePublic
      - AuthPublic

    ReadListTests:
      - TestHelpers
      - ReadListPrivate
      - ReadListPublic

    StaticPageTests:
      - Shared
      - TestHelpers
      - StaticPagePrivate
      - StaticPagePublic
      - AuthPublic

    StoryTests:
      - Shared
      - TestHelpers
      - StoryPrivate
      - StoryPublic
      - AuthPublic
      - ProfilePublic
      - StoryRefPublic
      - StoryRefPrivate

    StoryRefTests:
      - Shared
      - TestHelpers
      - StoryRefPrivate
      - StoryRefPublic

    AdminTests:
      - Shared
      - TestHelpers
      - AdminPrivate
      - AuthPublic
      - NewsPublic
      - ProfilePublic
      - StaticPagePublic
      - StoryPublic
      - StoryRefPublic
      - StoryRefPrivate
